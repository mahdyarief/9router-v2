name = "ammail"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "ammail-db"
database_id = "REPLACE_WITH_DATABASE_ID"

# Environment variables
[vars]
API_KEY = "REPLACE_WITH_RANDOM_KEY"
# TELEGRAM_BOT_TOKEN = "optional"

# Email routing
[triggers]
email = ["*@yourdomain.com"]
